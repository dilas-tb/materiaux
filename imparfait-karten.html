<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>L'imparfait - Karteikarten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-weight: 300; margin-bottom: 10px; font-size: 1.8em; }
  .subtitle { color: #888; margin-bottom: 25px; font-size: 0.95em; }
  
  .mode-selector, .start-screen, .end-screen {
    background: #2a2a2a;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    max-width: 500px;
    width: 100%;
  }
  
  button {
    background: #3a3a3a;
    color: #e0e0e0;
    border: 1px solid #555;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 1em;
    cursor: pointer;
    margin: 8px;
    transition: background 0.2s;
  }
  button:hover { background: #4a4a4a; }
  button.primary { background: #4a6fa5; border-color: #4a6fa5; }
  button.primary:hover { background: #5a7fb5; }
  
  .progress {
    color: #888;
    margin-bottom: 15px;
    font-size: 0.9em;
  }
  
  .card-container {
    perspective: 1200px;
    width: 100%;
    max-width: 450px;
    height: 280px;
    margin-bottom: 20px;
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: #2a2a2a;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 25px;
    border: 1px solid #3a3a3a;
  }
  .card-back { transform: rotateY(180deg); }
  
  .card-main {
    font-size: 2em;
    font-weight: 300;
    text-align: center;
    margin-bottom: 12px;
  }
  .card-sub {
    font-size: 0.95em;
    color: #888;
    font-style: italic;
  }
  .hint {
    position: absolute;
    bottom: 12px;
    color: #555;
    font-size: 0.75em;
  }
  
  .speak-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    border: 1px solid #555;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    padding: 0;
    margin: 0;
    font-size: 1.2em;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .answer-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    width: 100%;
    max-width: 450px;
  }
  .answer-buttons button {
    flex: 1;
    margin: 0;
  }
  .knew { background: #2d5a3d; border-color: #2d5a3d; }
  .knew:hover { background: #3d6a4d; }
  .didnt-know { background: #5a2d2d; border-color: #5a2d2d; }
  .didnt-know:hover { background: #6a3d3d; }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>L'imparfait</h1>
<div class="subtitle">Karteikarten zum Üben</div>

<div id="startScreen" class="start-screen">
  <h2 style="font-weight:300; margin-bottom:20px;">Übungsrichtung wählen</h2>
  <p style="color:#aaa; margin-bottom:20px; font-size:0.95em;">
    Klicke auf eine Karte, um sie umzudrehen.
  </p>
  <button class="primary" onclick="startGame('toInfinitive')">Imparfait → Infinitiv</button><br>
  <button class="primary" onclick="startGame('toImparfait')">Infinitiv + Pronomen → Imparfait</button>
</div>

<div id="gameScreen" class="hidden" style="width:100%; display:flex; flex-direction:column; align-items:center;">
  <div class="progress" id="progress"></div>
  <div class="card-container">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front">
        <button class="speak-btn hidden" id="speakFront" onclick="event.stopPropagation(); speak(currentSpeakText)">🔊</button>
        <div class="card-main" id="frontMain"></div>
        <div class="card-sub" id="frontSub"></div>
        <div class="hint">Klicken zum Umdrehen</div>
      </div>
      <div class="card-face card-back">
        <button class="speak-btn hidden" id="speakBack" onclick="event.stopPropagation(); speak(currentSpeakText)">🔊</button>
        <div class="card-main" id="backMain"></div>
        <div class="card-sub" id="backSub"></div>
        <div class="hint">Klicken zum Umdrehen</div>
      </div>
    </div>
  </div>
  <div class="answer-buttons">
    <button class="knew" onclick="answer(true)">Wusste ich!</button>
    <button class="didnt-know" onclick="answer(false)">Wusste ich nicht.</button>
  </div>
</div>

<div id="endScreen" class="end-screen hidden">
  <h2 style="font-weight:300; margin-bottom:20px;">Fertig! 🎉</h2>
  <p id="endStats" style="color:#aaa; margin-bottom:20px;"></p>
  <button class="primary" onclick="location.reload()">Neu starten</button>
</div>

<script>
// Verbliste: Infinitiv, deutsche Übersetzung, Stamm fürs Imparfait
const verbs = [
  { inf: "regarder", de: "anschauen", stem: "regard" },
  { inf: "parler", de: "sprechen", stem: "parl" },
  { inf: "manger", de: "essen", stem: "mange", isGer: true },
  { inf: "habiter", de: "wohnen", stem: "habit" },
  { inf: "jouer", de: "spielen", stem: "jou" },
  { inf: "écouter", de: "zuhören", stem: "écout" },
  { inf: "travailler", de: "arbeiten", stem: "travaill" },
  { inf: "aimer", de: "lieben/mögen", stem: "aim" },
  { inf: "chanter", de: "singen", stem: "chant" },
  { inf: "danser", de: "tanzen", stem: "dans" },
  { inf: "finir", de: "beenden", stem: "finiss" },
  { inf: "choisir", de: "wählen", stem: "choisiss" },
  { inf: "faire", de: "machen", stem: "fais" },
  { inf: "prendre", de: "nehmen", stem: "pren" },
  { inf: "venir", de: "kommen", stem: "ven" },
  { inf: "voir", de: "sehen", stem: "voy" },
  { inf: "aller", de: "gehen", stem: "all" },
  { inf: "avoir", de: "haben", stem: "av" },
  { inf: "être", de: "sein", stem: "ét", isEtre: true },
  { inf: "boire", de: "trinken", stem: "buv" },
  { inf: "lire", de: "lesen", stem: "lis" },
  { inf: "écrire", de: "schreiben", stem: "écriv" },
  { inf: "dire", de: "sagen", stem: "dis" },
  { inf: "partir", de: "abfahren/weggehen", stem: "part" }
];

const pronouns = [
  { pr: "je", end: "ais", elision: true },
  { pr: "tu", end: "ais" },
  { pr: "il", end: "ait" },
  { pr: "elle", end: "ait" },
  { pr: "nous", end: "ions" },
  { pr: "vous", end: "iez" },
  { pr: "ils", end: "aient" },
  { pr: "elles", end: "aient" }
];

function conjugate(verb, pronoun) {
  let stem = verb.stem;
  let end = pronoun.end;
  // -ger Verben: "mange" + ais => mangeais (e bleibt vor a/o)
  // bei nous/vous (ions/iez) entfällt das e nicht: mangions? Eigentlich: nous mangions (ohne e)
  if (verb.isGer) {
    if (pronoun.end.startsWith("i")) {
      stem = stem.slice(0, -1); // entferne e
    }
  }
  if (verb.isEtre) {
    stem = "ét";
  }
  let pr = pronoun.pr;
  let conjugated = stem + end;
  // Elision je -> j' vor Vokal
  if (pronoun.elision && /^[aeiouéèêâîôûh]/i.test(conjugated)) {
    pr = "j'";
    return pr + conjugated;
  }
  return pr + " " + conjugated;
}

let mode;
let queue = [];
let didntKnow = [];
let currentItem = null;
let total = 0;
let knewCount = 0;
let isFlipped = false;
let isAnimating = false;
let currentSpeakText = "";

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame(selectedMode) {
  mode = selectedMode;
  queue = shuffle(verbs.map(v => {
    const pronoun = pronouns[Math.floor(Math.random() * pronouns.length)];
    return { verb: v, pronoun: pronoun };
  }));
  didntKnow = [];
  total = queue.length;
  knewCount = 0;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  nextCard();
}

function updateProgress() {
  const remaining = queue.length;
  document.getElementById('progress').textContent = 
    `Verbleibend: ${remaining}  |  Gewusst: ${knewCount}  |  Wiederholen: ${didntKnow.length}`;
}

function nextCard() {
  if (queue.length === 0) {
    if (didntKnow.length > 0) {
      queue = shuffle(didntKnow);
      didntKnow = [];
    } else {
      endGame();
      return;
    }
  }
  currentItem = queue.shift();
  isFlipped = false;
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  loadCardContent();
  updateProgress();
}

function loadCardContent() {
  const conjugated = conjugate(currentItem.verb, currentItem.pronoun);
  const speakFront = document.getElementById('speakFront');
  const speakBack = document.getElementById('speakBack');
  
  if (mode === 'toInfinitive') {
    // Front: konjugierte Form (mit Speak), Back: Infinitiv + Übersetzung
    document.getElementById('frontMain').textContent = conjugated;
    document.getElementById('frontSub').textContent = "";
    document.getElementById('backMain').textContent = currentItem.verb.inf;
    document.getElementById('backSub').textContent = currentItem.verb.de;
    speakFront.classList.remove('hidden');
    speakBack.classList.add('hidden');
    currentSpeakText = conjugated;
  } else {
    // Front: Infinitiv + Pronomen, Back: konjugierte Form (mit Speak)
    document.getElementById('frontMain').textContent = 
      currentItem.verb.inf + " — " + currentItem.pronoun.pr;
    document.getElementById('frontSub').textContent = currentItem.verb.de;
    document.getElementById('backMain').textContent = conjugated;
    document.getElementById('backSub').textContent = "";
    speakFront.classList.add('hidden');
    speakBack.classList.remove('hidden');
    currentSpeakText = conjugated;
  }
}

function flipCard() {
  if (isAnimating) return;
  const card = document.getElementById('card');
  isFlipped = !isFlipped;
  card.classList.toggle('flipped');
}

function answer(knew) {
  if (isAnimating) return;
  if (knew) knewCount++;
  else didntKnow.push(currentItem);
  
  // Wenn umgedreht, erst zurückdrehen, dann neue Karte laden
  isAnimating = true;
  const card = document.getElementById('card');
  
  if (isFlipped) {
    card.classList.remove('flipped');
    isFlipped = false;
    setTimeout(() => {
      isAnimating = false;
      nextCard();
    }, 650);
  } else {
    setTimeout(() => {
      isAnimating = false;
      nextCard();
    }, 50);
  }
}

function endGame() {
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('endStats').textContent = 
    `Du hast insgesamt ${knewCount} von ${total} Karten beim ersten Versuch gewusst.`;
}

function speak(text) {
  if (!('speechSynthesis' in window)) {
    alert("Sprachausgabe wird von diesem Browser nicht unterstützt.");
    return;
  }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR';
  utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}
</script>

</body>
</html>
