html_content = """<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Imparfait – Karteikarten</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;

  }

  h1 {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #aaa;
    margin-bottom: 8px;

  }

  #mode-screen {
    display: flex;
    flex-direction: column;
    align-items: center;

  }

  #mode-screen p {
    color: #888;
    font-size: 0.9rem;

  .mode-btn {
    background: #1e1e1e;

  #progress-info {
    color: #666;

    letter-spacing: 0.08em;

  }

  #progress-bar-wrap {
    width: 100%;

  }
  #progress-bar {
    height: 100%;
    background: #4a9eff;

  /* Card flip */
  .card-scene {

  .card-inner {

  .card-face {

    background: #141f2e;

  .card-label {
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #555;

  .card-word {
    font-size: 2rem;
    font-weight: 400;
    color: #e8e8e8;

  .card-hint {
    font-size: 0.8rem;

    border: 1px solid #2a5080;

    padding: 8px 20px;

    cursor: pointer;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    transition: background 0.2s;
    display: flex;

    gap: 8px;
  }
  .speak-btn:hover { background: #25497a; }
  .speak-btn.hidden { visibility: hidden; pointer-events: none; }

  .speak-icon { font-size: 1rem; }

  .flip-hint {
    font-size: 0.72rem;

  #answer-btns {

  #answer-btns.visible { opacity: 1; pointer-events: auto; }

  .ans-btn {
    flex: 1;

    transition: background 0.2s, border-color 0.2s;
  }
  #btn-knew { background: #0d2b1a; color: #4caf50; border-color: #1e5c2f; }
  #btn-knew:hover { background: #143d24; }
  #btn-didnt { background: #2b1010; color: #ef5350; border-color: #5c1e1e; }
  #btn-didnt:hover { background: #3d1414; }

  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }
  #done-screen h2 { font-weight: 300; font-size: 1.5rem; color: #e0e0e0; }
  #done-screen p { color: #888; font-size: 0.9rem; }
  #restart-btn {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 12px 28px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    transition: background 0.2s;

  #restart-btn:hover { background: #2a2a2a; }

<body>

<div id="mode-screen">
  <h1>L'Imparfait</h1>
  <p>Wähle eine Übungsrichtung</p>
  <button class="mode-btn" onclick="startMode('toInfinitive')">Imparfait-Form &rarr; Infinitiv</button>
  <button class="mode-btn" onclick="startMode('toConjugated')">Infinitiv + Pronomen &rarr; Imparfait</button>
</div>

<div id="app">
  <div id="progress-info">Karte <span id="cur">1</span> von <span id="total">1</span></div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

  <div class="card-scene" onclick="flipCard()">
    <div class="card-inner" id="card-inner">

      <div class="card-face card-front">
        <span class="card-label" id="front-label">Frage</span>
        <span class="card-word" id="front-word"></span>
        <button class="speak-btn hidden" id="speak-front" onclick="event.stopPropagation(); speakFront()">
          <span class="speak-icon">🔊</span> Anhören
        </button>
        <span class="flip-hint">Karte umdrehen</span>
      </div>

      <div class="card-face card-back">
        <span class="card-label" id="back-label">Antwort</span>
        <span class="card-word" id="back-word"></span>
        <button class="speak-btn hidden" id="speak-back" onclick="event.stopPropagation(); speakBack()">
          <span class="speak-icon">🔊</span> Anhören
        </button>
      </div>

    </div>
  </div>

  <div id="answer-btns">
    <button class="ans-btn" id="btn-knew" onclick="answer(true)">✓ Wusste ich!</button>
    <button class="ans-btn" id="btn-didnt" onclick="answer(false)">✗ Wusste ich nicht.</button>
  </div>
</div>

<div id="done-screen">
  <h2>Fertig! 🎉</h2>
  <p id="done-stats"></p>
  <button id="restart-btn" onclick="backToMenu()">Zurück zum Menü</button>
</div>

<script>
const VERBS = [
  "regarder","parler","écouter","travailler","manger","commencer","aller","être",
  "avoir","faire","prendre","venir","pouvoir","vouloir","devoir","savoir","voir",
  "dire","lire","écrire","finir","choisir","remplir","attendre","répondre",
  "entendre","vendre","rendre","comprendre","apprendre","mettre","connaître",
  "croire","vivre","suivre","sortir","partir","dormir","servir","sentir",
  "jouer","aimer","donner","chercher","trouver","habiter","arriver","rester",
  "tomber","marcher","chanter","danser","visiter","montrer","penser","appeler",
  "acheter","lever","porter","laisser","demander","répondre"
];

const PRONOUNS = ["je","tu","il/elle","nous","vous","ils/elles"];

// Imparfait stems: for -er, -ir, -re verbs: use present-ils stem
// Special cases for être, avoir, faire, etc.
const SPECIAL_STEMS = {
  "être": "ét",
  "avoir": "av",
  "faire": "fais",
  "aller": "all",
  "venir": "ven",
  "pouvoir": "pouv",
  "vouloir": "voul",
  "devoir": "dev",
  "savoir": "sav",
  "voir": "voy",
  "dire": "dis",
  "lire": "lis",
  "écrire": "écriv",
  "prendre": "pren",
  "mettre": "mett",
  "connaître": "connaiss",
  "croire": "croy",
  "vivre": "viv",
  "suivre": "suiv",
  "sortir": "sort",
  "partir": "part",
  "dormir": "dorm",
  "servir": "serv",
  "sentir": "sent",
  "comprendre": "compren",
  "apprendre": "appren",
  "attendre": "attend",
  "répondre": "répond",
  "entendre": "entend",
  "vendre": "vend",
  "rendre": "rend",
  "finir": "finiss",
  "choisir": "choisiss",
  "remplir": "rempliss",
  "appeler": "appell",
  "acheter": "achet",
  "lever": "lev",
  "manger": "mange",
  "commencer": "commenç"
};

const ENDINGS = ["ais","ais","ait","ions","iez","aient"];

function getStem(verb) {
  if (SPECIAL_STEMS[verb]) return SPECIAL_STEMS[verb];
  // Regular: remove ending
  if (verb.endsWith("ger")) return verb.slice(0,-2); // manger -> mange (handled above)
  if (verb.endsWith("cer")) return verb.slice(0,-2); // commencer -> commenc (handled above)
  if (verb.endsWith("er")) return verb.slice(0,-2);
  if (verb.endsWith("ir")) return verb.slice(0,-1) + "ss"; // default -ir
  if (verb.endsWith("re")) return verb.slice(0,-2);
  return verb;
}

// Override for regular -ir with no double-s (sortir-like already in SPECIAL_STEMS)
const NO_SS_IR = ["sortir","partir","dormir","servir","sentir"];
// These are already in SPECIAL_STEMS so fine.

function conjugate(verb, pronIdx) {
  const stem = getStem(verb);
  return PRONOUNS[pronIdx] + " " + stem + ENDINGS[pronIdx];
}

let deck = [];
let currentMode = "";
let currentIndex = 0;
let notKnown = [];
let totalCount = 0;
let knownCount = 0;
let isFlipped = false;
let animating = false;
let reviewPhase = false;

function buildDeck(mode) {
  const cards = [];
  VERBS.forEach(verb => {
    PRONOUNS.forEach((_, pIdx) => {
      const conj = conjugate(verb, pIdx);
      cards.push({ verb, pIdx, conj });
    });
  });
  // Shuffle
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  return cards;
}

function startMode(mode) {
  currentMode = mode;
  deck = buildDeck(mode);
  notKnown = [];
  currentIndex = 0;
  totalCount = deck.length;
  knownCount = 0;
  reviewPhase = false;
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadCard();
}

function loadCard() {
  isFlipped = false;
  animating = false;
  const cardInner = document.getElementById('card-inner');
  cardInner.classList.remove('flipped');
  document.getElementById('answer-btns').classList.remove('visible');

  const card = deck[currentIndex];

  // Update progress
  const displayed = currentIndex + 1;
  const tot = deck.length;
  document.getElementById('cur').textContent = displayed;
  document.getElementById('total').textContent = tot;
  document.getElementById('progress-bar').style.width = ((displayed-1)/tot*100) + '%';

  if (currentMode === 'toInfinitive') {
    // Front: conjugated form, Back: infinitive
    document.getElementById('front-label').textContent = 'Imparfait';
    document.getElementById('front-word').textContent = card.conj;
    document.getElementById('back-label').textContent = 'Infinitif';
    document.getElementById('back-word').textContent = card.verb;
    // Speak on front (conjugated)
    document.getElementById('speak-front').classList.remove('hidden');
    document.getElementById('speak-back').classList.add('hidden');
    document.getElementById('speak-front').onclick = function(e){ e.stopPropagation(); speak(card.conj); };
  } else {
    // Front: infinitive + pronoun, Back: conjugated
    document.getElementById('front-label').textContent = 'Infinitif + Pronom';
    document.getElementById('front-word').textContent = PRONOUNS[card.pIdx] + ' + ' + card.verb;
    document.getElementById('back-label').textContent = 'Imparfait';
    document.getElementById('back-word').textContent = card.conj;
    // Speak on back (conjugated)
    document.getElementById('speak-front').classList.add('hidden');
    document.getElementById('speak-back').classList.remove('hidden');
    document.getElementById('speak-back').onclick = function(e){ e.stopPropagation(); speak(card.conj); };
  }
}

function flipCard() {
  if (animating) return;
  const cardInner = document.getElementById('card-inner');
  if (!isFlipped) {
    animating = true;
    isFlipped = true;
    cardInner.classList.add('flipped');
    setTimeout(() => {
      animating = false;
      document.getElementById('answer-btns').classList.add('visible');
    }, 570);
  }
}

function answer(knew) {
  if (animating) return;
  if (!isFlipped) return;
  const card = deck[currentIndex];
  if (!knew) {
    notKnown.push(card);
  } else {
    knownCount++;
  }
  nextCard();
}

function nextCard() {
  animating = true;
  const cardInner = document.getElementById('card-inner');
  document.getElementById('answer-btns').classList.remove('visible');

  // Flip back first
  if (isFlipped) {
    cardInner.classList.remove('flipped');
    setTimeout(() => {
      animating = false;
      proceedNext();
    }, 570);
  } else {
    animating = false;
    proceedNext();
  }
}

function proceedNext() {
  currentIndex++;
  if (currentIndex < deck.length) {
    loadCard();
  } else {
    // Check if there are notKnown cards
    if (notKnown.length > 0) {
      deck = [...notKnown];
      notKnown = [];
      currentIndex = 0;
      reviewPhase = true;
      loadCard();
    } else {
      showDone();
    }
  }
}

function showDone() {
  document.getElementById('app').style.display = 'none';
  const done = document.getElementById('done-screen');
  done.style.display = 'flex';
  document.getElementById('done-stats').textContent =
    'Du hast alle Karten durchgearbeitet!';
}

function backToMenu() {
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('mode-screen').style.display = 'flex';
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'fr-FR';
  utter.rate = 0.9;
  // Try to find a French voice
  const voices = window.speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) utter.voice = frVoice;
  window.speechSynthesis.speak(utter);
}

// Load voices early
window.speechSynthesis && window.speechSynthesis.getVoices();
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
</body>
</html>
