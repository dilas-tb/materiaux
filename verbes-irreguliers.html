<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Die unregelmäßigen Verben</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at 20% 0%, #2a1f3d 0%, #16121f 60%);
    color: #ece6f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-weight: 400;
    margin-bottom: 1.5rem;
    background: linear-gradient(90deg, #ffd86b, #c79bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 0.5px;
  }
  .groups {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
    margin-bottom: 2rem;
    max-width: 720px;
  }
  .group-btn {
    background: rgba(255,255,255,0.04);
    color: #b8aacb;
    border: 1px solid rgba(199,155,255,0.25);
    padding: 0.55rem 1.1rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .group-btn:hover { border-color: #c79bff; color: #ece6f5; }
  .group-btn.active {
    background: linear-gradient(135deg, #c79bff, #8e6bd6);
    color: #1a1426;
    border-color: transparent;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(199,155,255,0.3);
  }
  .start-btn, .control-btn {
    background: linear-gradient(135deg, #ffd86b, #ffb347);
    color: #2a1f0a;
    border: none;
    padding: 0.75rem 1.7rem;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    margin: 0.5rem;
    box-shadow: 0 4px 20px rgba(255,216,107,0.25);
    transition: transform 0.15s;
  }
  .start-btn:hover, .control-btn:hover { transform: translateY(-2px); }
  .card-container {
    perspective: 1000px;
    width: 100%;
    max-width: 440px;
    height: 280px;
    margin: 1rem 0;
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: linear-gradient(145deg, #251c38, #1c1529);
    border: 1px solid rgba(199,155,255,0.2);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .front { border-top: 3px solid #ffd86b; }
  .back  { transform: rotateY(180deg); border-top: 3px solid #c79bff; }
  .front-text { font-size: 2.1rem; font-weight: 300; color: #ffd86b; }
  .back-text  { font-size: 2.1rem; font-weight: 500; color: #c79bff; }
  .translation { font-style: italic; color: #8a7fa3; margin-top: 0.7rem; font-size: 1rem; }
  .speak-btn {
    margin-top: 1.1rem;
    background: rgba(199,155,255,0.1);
    border: 1px solid rgba(199,155,255,0.4);
    color: #c79bff;
    padding: 0.45rem 1rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .speak-btn:hover { background: rgba(199,155,255,0.2); }
  .answer-btns {
    display: flex;
    gap: 1rem;
    margin-top: 1.2rem;
    min-height: 50px;
  }
  .knew, .didnt {
    border: none;
    padding: 0.65rem 1.3rem;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.15s;
  }
  .knew  { background: linear-gradient(135deg, #ffd86b, #ffb347); color: #2a1f0a; }
  .didnt { background: rgba(199,155,255,0.15); color: #d4bbf5; border: 1px solid rgba(199,155,255,0.4); }
  .knew:hover, .didnt:hover { transform: translateY(-2px); }
  .progress { color: #8a7fa3; font-size: 0.9rem; margin-top: 1rem; }
  .hidden { display: none !important; }
  .done { font-size: 1.4rem; color: #ffd86b; margin: 2rem; text-align:center; }
</style>
</head>
<body>

<h1>Die unregelmäßigen Verben</h1>

<div class="groups">
  <button class="group-btn active" data-group="goldene">Goldene Verben</button>
  <button class="group-btn" data-group="oir">Verben auf -oir</button>
  <button class="group-btn" data-group="dre">Verben auf -dre</button>
  <button class="group-btn" data-group="ire">Verben auf -ire</button>
  <button class="group-btn" data-group="ir">Verben auf -ir</button>
</div>

<button class="start-btn" id="startBtn">Übung starten</button>

<div id="exercise" class="hidden" style="display:flex; flex-direction:column; align-items:center;">
  <div class="card-container">
    <div class="card" id="card">
      <div class="face front">
        <div class="front-text" id="frontText"></div>
      </div>
      <div class="face back">
        <div class="back-text" id="backText"></div>
        <div class="translation" id="translation"></div>
        <button class="speak-btn" id="speakBtn">🔊 Aussprache</button>
      </div>
    </div>
  </div>
  <div class="answer-btns" id="answerBtns">
    <button class="knew" id="knewBtn">Wusste ich!</button>
    <button class="didnt" id="didntBtn">Wusste ich nicht.</button>
  </div>
  <div class="progress" id="progress"></div>
  <button class="control-btn" id="restartBtn">Neu starten</button>
</div>

<div id="doneScreen" class="hidden done"></div>

<script>
/* ============================================================
   VERBTABELLEN - Lesefreundlich
   Format pro Verb:
     de_forms: konjugierte deutsche Formen [ich, du, er, wir, ihr, sie]
     forms:    konjugierte französische Formen analog
   ============================================================ */

const PRONOUNS = ["je", "tu", "il", "nous", "vous", "ils"];
const PRONOUN_TRANS = {
  "je": "ich", "tu": "du", "il": "er",
  "nous": "wir", "vous": "ihr", "ils": "sie"
};

const VERBS = {
  goldene: {
    "être":  { forms: ["suis","es","est","sommes","êtes","sont"],
               de_forms: ["bin","bist","ist","sind","seid","sind"] },
    "avoir": { forms: ["ai","as","a","avons","avez","ont"],
               de_forms: ["habe","hast","hat","haben","habt","haben"] },
    "aller": { forms: ["vais","vas","va","allons","allez","vont"],
               de_forms: ["gehe","gehst","geht","gehen","geht","gehen"] },
    "faire": { forms: ["fais","fais","fait","faisons","faites","font"],
               de_forms: ["mache","machst","macht","machen","macht","machen"] }
  },
  oir: {
    "pouvoir":  { forms: ["peux","peux","peut","pouvons","pouvez","peuvent"],
                  de_forms: ["kann","kannst","kann","können","könnt","können"] },
    "vouloir":  { forms: ["veux","veux","veut","voulons","voulez","veulent"],
                  de_forms: ["will","willst","will","wollen","wollt","wollen"] },
    "voir":     { forms: ["vois","vois","voit","voyons","voyez","voient"],
                  de_forms: ["sehe","siehst","sieht","sehen","seht","sehen"] },
    "savoir":   { forms: ["sais","sais","sait","savons","savez","savent"],
                  de_forms: ["weiß","weißt","weiß","wissen","wisst","wissen"] },
    "devoir":   { forms: ["dois","dois","doit","devons","devez","doivent"],
                  de_forms: ["muss","musst","muss","müssen","müsst","müssen"] },
    "recevoir": { forms: ["reçois","reçois","reçoit","recevons","recevez","reçoivent"],
                  de_forms: ["erhalte","erhältst","erhält","erhalten","erhaltet","erhalten"] }
  },
  dre: {
    "prendre":    { forms: ["prends","prends","prend","prenons","prenez","prennent"],
                    de_forms: ["nehme","nimmst","nimmt","nehmen","nehmt","nehmen"] },
    "apprendre":  { forms: ["apprends","apprends","apprend","apprenons","apprenez","apprennent"],
                    de_forms: ["lerne","lernst","lernt","lernen","lernt","lernen"] },
    "comprendre": { forms: ["comprends","comprends","comprend","comprenons","comprenez","comprennent"],
                    de_forms: ["verstehe","verstehst","versteht","verstehen","versteht","verstehen"] },
    "vendre":     { forms: ["vends","vends","vend","vendons","vendez","vendent"],
                    de_forms: ["verkaufe","verkaufst","verkauft","verkaufen","verkauft","verkaufen"] },
    "descendre":  { forms: ["descends","descends","descend","descendons","descendez","descendent"],
                    de_forms: ["gehe hinunter","gehst hinunter","geht hinunter","gehen hinunter","geht hinunter","gehen hinunter"] },
    "attendre":   { forms: ["attends","attends","attend","attendons","attendez","attendent"],
                    de_forms: ["warte","wartest","wartet","warten","wartet","warten"] },
    "entendre":   { forms: ["entends","entends","entend","entendons","entendez","entendent"],
                    de_forms: ["höre","hörst","hört","hören","hört","hören"] },
    "répondre":   { forms: ["réponds","réponds","répond","répondons","répondez","répondent"],
                    de_forms: ["antworte","antwortest","antwortet","antworten","antwortet","antworten"] },
    "perdre":     { forms: ["perds","perds","perd","perdons","perdez","perdent"],
                    de_forms: ["verliere","verlierst","verliert","verlieren","verliert","verlieren"] }
  },
  ire: {
    "dire":       { forms: ["dis","dis","dit","disons","dites","disent"],
                    de_forms: ["sage","sagst","sagt","sagen","sagt","sagen"] },
    "lire":       { forms: ["lis","lis","lit","lisons","lisez","lisent"],
                    de_forms: ["lese","liest","liest","lesen","lest","lesen"] },
    "écrire":     { forms: ["écris","écris","écrit","écrivons","écrivez","écrivent"],
                    de_forms: ["schreibe","schreibst","schreibt","schreiben","schreibt","schreiben"] },
    "boire":      { forms: ["bois","bois","boit","buvons","buvez","boivent"],
                    de_forms: ["trinke","trinkst","trinkt","trinken","trinkt","trinken"] },
    "croire":     { forms: ["crois","crois","croit","croyons","croyez","croient"],
                    de_forms: ["glaube","glaubst","glaubt","glauben","glaubt","glauben"] },
    "traduire":   { forms: ["traduis","traduis","traduit","traduisons","traduisez","traduisent"],
                    de_forms: ["übersetze","übersetzt","übersetzt","übersetzen","übersetzt","übersetzen"] },
    "produire":   { forms: ["produis","produis","produit","produisons","produisez","produisent"],
                    de_forms: ["produziere","produzierst","produziert","produzieren","produziert","produzieren"] },
    "construire": { forms: ["construis","construis","construit","construisons","construisez","construisent"],
                    de_forms: ["baue","baust","baut","bauen","baut","bauen"] }
  },
  ir: {
    "venir":   { forms: ["viens","viens","vient","venons","venez","viennent"],
                 de_forms: ["komme","kommst","kommt","kommen","kommt","kommen"] },
    "sortir":  { forms: ["sors","sors","sort","sortons","sortez","sortent"],
                 de_forms: ["gehe aus","gehst aus","geht aus","gehen aus","geht aus","gehen aus"] },
    "tenir":   { forms: ["tiens","tiens","tient","tenons","tenez","tiennent"],
                 de_forms: ["halte","hältst","hält","halten","haltet","halten"] },
    "devenir": { forms: ["deviens","deviens","devient","devenons","devenez","deviennent"],
                 de_forms: ["werde","wirst","wird","werden","werdet","werden"] },
    "dormir":  { forms: ["dors","dors","dort","dormons","dormez","dorment"],
                 de_forms: ["schlafe","schläfst","schläft","schlafen","schlaft","schlafen"] },
    "mentir":  { forms: ["mens","mens","ment","mentons","mentez","mentent"],
                 de_forms: ["lüge","lügst","lügt","lügen","lügt","lügen"] },
    "partir":  { forms: ["pars","pars","part","partons","partez","partent"],
                 de_forms: ["reise ab","reist ab","reist ab","reisen ab","reist ab","reisen ab"] },
    "sentir":  { forms: ["sens","sens","sent","sentons","sentez","sentent"],
                 de_forms: ["fühle","fühlst","fühlt","fühlen","fühlt","fühlen"] },
    "ouvrir":  { forms: ["ouvre","ouvres","ouvre","ouvrons","ouvrez","ouvrent"],
                 de_forms: ["öffne","öffnest","öffnet","öffnen","öffnet","öffnen"] }
  }
};

/* ============================================================
   Logik
   ============================================================ */

const activeGroups = new Set(["goldene"]);

document.querySelectorAll(".group-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const g = btn.dataset.group;
    if (activeGroups.has(g)) {
      if (activeGroups.size > 1) { activeGroups.delete(g); btn.classList.remove("active"); }
    } else {
      activeGroups.add(g); btn.classList.add("active");
    }
  });
});

let queue = [];
let retryQueue = [];
let current = null;
let isFlipped = false;
let isAnimating = false;

function buildQueue() {
  const cards = [];
  activeGroups.forEach(g => {
    const group = VERBS[g];
    for (const inf in group) {
      const v = group[inf];
      PRONOUNS.forEach((p, i) => {
        let form = v.forms[i];
        let pron = p;
        if (p === "je" && /^[aeiouhéè]/i.test(form)) {
          pron = "j'";
        }
        const front = (pron.endsWith("'") ? pron : pron + " + ") + inf;
        const back  = (pron.endsWith("'") ? pron : pron + " ") + form;
        const trans = PRONOUN_TRANS[p] + " " + v.de_forms[i];
        cards.push({ front, back, trans, speak: back });
      });
    }
  });
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  return cards;
}

const card = document.getElementById("card");
const frontText = document.getElementById("frontText");
const backText = document.getElementById("backText");
const translation = document.getElementById("translation");
const progress = document.getElementById("progress");
const speakBtn = document.getElementById("speakBtn");

document.getElementById("startBtn").addEventListener("click", () => {
  queue = buildQueue();
  retryQueue = [];
  document.getElementById("startBtn").classList.add("hidden");
  document.querySelector(".groups").classList.add("hidden");
  document.getElementById("exercise").classList.remove("hidden");
  document.getElementById("doneScreen").classList.add("hidden");
  nextCard();
});

document.getElementById("restartBtn").addEventListener("click", () => location.reload());

function nextCard() {
  if (queue.length === 0 && retryQueue.length > 0) {
    queue = retryQueue;
    retryQueue = [];
  }
  if (queue.length === 0) { finish(); return; }
  current = queue.shift();
  frontText.textContent = current.front;
  backText.textContent = current.back;
  translation.textContent = current.trans;
  progress.textContent = `Verbleibend: ${queue.length} | Wiederholungen: ${retryQueue.length}`;
}

card.addEventListener("click", () => {
  if (isAnimating) return;
  if (!isFlipped) { isFlipped = true; card.classList.add("flipped"); }
});

speakBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  const u = new SpeechSynthesisUtterance(current.speak);
  u.lang = "fr-FR";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
});

function handleAnswer(knew) {
  if (!isFlipped || isAnimating) return;
  if (!knew) retryQueue.push(current);
  isAnimating = true;
  card.classList.remove("flipped");
  setTimeout(() => {
    isFlipped = false;
    isAnimating = false;
    nextCard();
  }, 650);
}

document.getElementById("knewBtn").addEventListener("click", (e) => { e.stopPropagation(); handleAnswer(true); });
document.getElementById("didntBtn").addEventListener("click", (e) => { e.stopPropagation(); handleAnswer(false); });

function finish() {
  document.getElementById("exercise").classList.add("hidden");
  const done = document.getElementById("doneScreen");
  done.classList.remove("hidden");
  done.innerHTML = "🎉 Bravo ! Alle Karten geschafft.<br><br><button class='control-btn' onclick='location.reload()'>Neu starten</button>";
}
</script>
</body>
</html>
