<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjugaison – faire, aller, avoir, être</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#0f0f1a;min-height:100vh;padding:30px 20px;color:#e0e0f0}
.container{max-width:960px;margin:0 auto}
header{text-align:center;padding:36px 20px 28px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:20px;margin-bottom:36px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
header h1{font-size:2em;color:#c9b8ff;letter-spacing:1px;margin-bottom:6px}
header p{color:#7a7a9a;font-size:1em}
.flag-bar{height:5px;background:linear-gradient(90deg,#3a3aff 33%,#eee 33%,#eee 66%,#cc2233 66%);border-radius:3px;margin-top:18px;opacity:0.7}
.verb-section{background:#13132a;border:1px solid #2a2a4a;border-radius:20px;margin-bottom:30px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.4)}
.verb-header{display:flex;align-items:center;gap:16px;padding:20px 28px;border-bottom:1px solid #2a2a4a}
.verb-title{font-size:1.6em;font-weight:800;letter-spacing:0.5px}
.verb-subtitle{font-size:0.9em;color:#7a7a9a;margin-top:2px}
.verb-badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:0.75em;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fff}
.conj-table{width:100%;border-collapse:collapse}
.conj-table tr:last-child td{border-bottom:none}
.conj-table td{padding:15px 28px;border-bottom:1px solid #1e1e38;vertical-align:middle}
.conj-table tr:hover td{background:rgba(255,255,255,0.03)}
.pronoun{font-size:1em;color:#8888aa;font-weight:700;width:38%}
.form-wrap{display:flex;align-items:center;gap:14px}
.form{font-size:1.25em;font-weight:800;letter-spacing:0.3px}
.example{font-size:0.85em;color:#6a6a8a;margin-top:3px}
.speak-btn{background:none;border:1.5px solid #333355;border-radius:10px;padding:7px 13px;cursor:pointer;font-size:0.85em;font-family:'Nunito',sans-serif;font-weight:700;color:#8888cc;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.speak-btn:hover{border-color:#9b8aff;color:#c9b8ff;background:rgba(155,138,255,0.08)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.speaking{animation:pulse 0.7s infinite;border-color:#9b8aff!important;color:#c9b8ff!important}
.v-faire .verb-title{color:#60aaee}
.v-aller .verb-title{color:#ee6677}
.v-avoir .verb-title{color:#f0a050}
.v-etre  .verb-title{color:#55cc88}
.badge-faire{background:#1a4a7a}
.badge-aller{background:#7a1a2a}
.badge-avoir{background:#7a4a10}
.badge-etre {background:#1a5a3a}
.form-faire{color:#60aaee}
.form-aller{color:#ee6677}
.form-avoir{color:#f0a050}
.form-etre {color:#55cc88}
footer{text-align:center;padding:20px;color:#3a3a5a;font-size:0.85em}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🇫🇷 Conjugaison – Présent de l'indicatif</h1>
  <p>faire &bull; aller &bull; avoir &bull; être</p>
  <div class="flag-bar"></div>
</header>

<!-- ── FAIRE ─────────────────────────────────────────────── -->
<div class="verb-section v-faire">
  <div class="verb-header">
    <div>
      <div class="verb-title">faire</div>
      <div class="verb-subtitle">machen / tun</div>
    </div>
    <span class="verb-badge badge-faire">verbe irrégulier</span>
  </div>
  <table class="conj-table" id="table-faire"></table>
</div>

<!-- ── ALLER ─────────────────────────────────────────────── -->
<div class="verb-section v-aller">
  <div class="verb-header">
    <div>
      <div class="verb-title">aller</div>
      <div class="verb-subtitle">gehen</div>
    </div>
    <span class="verb-badge badge-aller">verbe irrégulier</span>
  </div>
  <table class="conj-table" id="table-aller"></table>
</div>

<!-- ── AVOIR ─────────────────────────────────────────────── -->
<div class="verb-section v-avoir">
  <div class="verb-header">
    <div>
      <div class="verb-title">avoir</div>
      <div class="verb-subtitle">haben</div>
    </div>
    <span class="verb-badge badge-avoir">verbe irrégulier</span>
  </div>
  <table class="conj-table" id="table-avoir"></table>
</div>

<!-- ── ÊTRE ──────────────────────────────────────────────── -->
<div class="verb-section v-etre">
  <div class="verb-header">
    <div>
      <div class="verb-title">être</div>
      <div class="verb-subtitle">sein</div>
    </div>
    <span class="verb-badge badge-etre">verbe irrégulier</span>
  </div>
  <table class="conj-table" id="table-etre"></table>
</div>

<footer>Klicke auf 🔊, um die Aussprache zu hören &bull; Web Speech API (fr-FR)</footer>

</div>

<script>
const verbs = {
  faire: {
    cls: 'form-faire',
    rows: [
      { pronoun: 'je',          form: 'fais',    example: 'Je fais mes devoirs.' },
      { pronoun: 'tu',          form: 'fais',    example: 'Tu fais du sport ?' },
      { pronoun: 'il / elle / on', form: 'fait', example: 'Il fait beau aujourd\'hui.' },
      { pronoun: 'nous',        form: 'faisons', example: 'Nous faisons la cuisine.' },
      { pronoun: 'vous',        form: 'faites',  example: 'Vous faites de la musique ?' },
      { pronoun: 'ils / elles', form: 'font',    example: 'Ils font un voyage en France.' },
    ]
  },
  aller: {
    cls: 'form-aller',
    rows: [
      { pronoun: 'je',          form: 'vais',    example: 'Je vais à l\'école.' },
      { pronoun: 'tu',          form: 'vas',     example: 'Tu vas bien ?' },
      { pronoun: 'il / elle / on', form: 'va',   example: 'Elle va au cinéma.' },
      { pronoun: 'nous',        form: 'allons',  example: 'Nous allons au marché.' },
      { pronoun: 'vous',        form: 'allez',   example: 'Vous allez en France ?' },
      { pronoun: 'ils / elles', form: 'vont',    example: 'Ils vont au stade.' },
    ]
  },
  avoir: {
    cls: 'form-avoir',
    rows: [
      { pronoun: 'j\'',         form: 'ai',      example: 'J\'ai faim.' },
      { pronoun: 'tu',          form: 'as',      example: 'Tu as de la chance !' },
      { pronoun: 'il / elle / on', form: 'a',    example: 'Elle a quinze ans.' },
      { pronoun: 'nous',        form: 'avons',   example: 'Nous avons un chien.' },
      { pronoun: 'vous',        form: 'avez',    example: 'Vous avez raison.' },
      { pronoun: 'ils / elles', form: 'ont',     example: 'Ils ont peur.' },
    ]
  },
  etre: {
    cls: 'form-etre',
    rows: [
      { pronoun: 'je',          form: 'suis',    example: 'Je suis fatigué.' },
      { pronoun: 'tu',          form: 'es',      example: 'Tu es prêt ?' },
      { pronoun: 'il / elle / on', form: 'est',  example: 'Il est en retard.' },
      { pronoun: 'nous',        form: 'sommes',  example: 'Nous sommes contents.' },
      { pronoun: 'vous',        form: 'êtes',    example: 'Vous êtes d\'accord ?' },
      { pronoun: 'ils / elles', form: 'sont',    example: 'Elles sont de retour.' },
    ]
  }
};

function speak(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = 'fr-FR';
  u.rate  = 0.80;
  u.pitch = 1.05;
  if (btn) {
    btn.classList.add('speaking');
    u.onend = () => btn.classList.remove('speaking');
  }
  window.speechSynthesis.speak(u);
}

// Render all tables
Object.entries(verbs).forEach(([key, data]) => {
  const table = document.getElementById('table-' + key);
  table.innerHTML = data.rows.map(row => `
    <tr>
      <td class="pronoun">${row.pronoun}</td>
      <td>
        <div class="form-wrap">
          <div>
            <div class="form ${data.cls}">${row.form}</div>
            <div class="example">${row.example}</div>
          </div>
          <button class="speak-btn" data-speak="${row.example.replace(/"/g,'&quot;')}">🔊 Beispiel</button>
        </div>
      </td>
    </tr>`).join('');
});

// Global click handler – kein Apostrophen-Problem
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-speak]');
  if (btn) speak(btn.dataset.speak, btn);
});
</script>
</body>
</html>
