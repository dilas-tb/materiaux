<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conjugaison – faire, aller, avoir, être</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#0f0f1a;min-height:100vh;padding:30px 20px;color:#e0e0f0}
.container{max-width:980px;margin:0 auto}
header{text-align:center;padding:36px 20px 28px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:20px;margin-bottom:36px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
header h1{font-size:2em;color:#c9b8ff;letter-spacing:1px;margin-bottom:6px}
header p{color:#7a7a9a;font-size:1em}
.flag-bar{height:5px;background:linear-gradient(90deg,#3a3aff 33%,#eee 33%,#eee 66%,#cc2233 66%);border-radius:3px;margin-top:18px;opacity:0.7}

.verb-section{background:#13132a;border:1px solid #2a2a4a;border-radius:20px;margin-bottom:30px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.4)}
.verb-header{padding:18px 28px;border-bottom:1px solid #2a2a4a}
.verb-title{font-size:1.6em;font-weight:800;letter-spacing:0.5px}
.verb-subtitle{font-size:0.9em;color:#7a7a9a;margin-top:2px}

.conj-table{width:100%;border-collapse:collapse;table-layout:fixed}
.conj-table tr:last-child td{border-bottom:none}
.conj-table td{padding:13px 20px;border-bottom:1px solid #1e1e38;vertical-align:middle}
.conj-table tr:hover td{background:rgba(255,255,255,0.03)}

/* Spaltenbreiten */
.col-pronoun{width:18%}
.col-form  {width:22%}
.col-example{width:60%}

.pronoun{font-size:1em;color:#8888aa;font-weight:700}
.form{font-size:1.3em;font-weight:800;letter-spacing:0.3px}

.speak-main{display:flex;align-items:center;gap:10px}
.speak-btn{background:none;border:1.5px solid #333355;border-radius:10px;padding:6px 11px;cursor:pointer;font-size:0.82em;font-family:'Nunito',sans-serif;font-weight:700;color:#8888cc;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.speak-btn:hover{border-color:#9b8aff;color:#c9b8ff;background:rgba(155,138,255,0.08)}

.example-fr{font-size:0.85em;font-style:italic;color:#9999bb}
.example-de{font-size:0.80em;color:#5a5a7a;margin-top:2px}
.example-cell{display:flex;align-items:center;gap:10px}
.example-texts{flex:1}
.speak-btn-sm{background:none;border:1.5px solid #2a2a44;border-radius:8px;padding:4px 9px;cursor:pointer;font-size:0.78em;font-family:'Nunito',sans-serif;font-weight:700;color:#6666aa;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.speak-btn-sm:hover{border-color:#9b8aff;color:#c9b8ff;background:rgba(155,138,255,0.08)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.speaking{animation:pulse 0.7s infinite;border-color:#9b8aff!important;color:#c9b8ff!important}

.v-faire .verb-title{color:#60aaee}
.v-aller .verb-title{color:#ee6677}
.v-avoir .verb-title{color:#f0a050}
.v-etre  .verb-title{color:#55cc88}
.form-faire{color:#60aaee}
.form-aller{color:#ee6677}
.form-avoir{color:#f0a050}
.form-etre {color:#55cc88}

footer{text-align:center;padding:20px;color:#3a3a5a;font-size:0.85em}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🇫🇷 Conjugaison – Présent de l'indicatif</h1>
  <p>faire &bull; aller &bull; avoir &bull; être</p>
  <div class="flag-bar"></div>
</header>

<div class="verb-section v-faire">
  <div class="verb-header">
    <div class="verb-title">faire</div>
    <div class="verb-subtitle">machen / tun</div>
  </div>
  <table class="conj-table" id="table-faire"></table>
</div>

<div class="verb-section v-aller">
  <div class="verb-header">
    <div class="verb-title">aller</div>
    <div class="verb-subtitle">gehen</div>
  </div>
  <table class="conj-table" id="table-aller"></table>
</div>

<div class="verb-section v-avoir">
  <div class="verb-header">
    <div class="verb-title">avoir</div>
    <div class="verb-subtitle">haben</div>
  </div>
  <table class="conj-table" id="table-avoir"></table>
</div>

<div class="verb-section v-etre">
  <div class="verb-header">
    <div class="verb-title">être</div>
    <div class="verb-subtitle">sein</div>
  </div>
  <table class="conj-table" id="table-etre"></table>
</div>

<footer>🔊 Konjugation anhören &bull; 💬 Beispielsatz anhören &bull; Web Speech API (fr-FR)</footer>

</div>
<script>
const verbs = {
  faire: {
    cls: 'form-faire',
    rows: [
      { pronoun:'je',             spoken:'je fais',    form:'fais',    ex_fr:'Je fais mes devoirs.',              ex_de:'Ich mache meine Hausaufgaben.' },
      { pronoun:'tu',             spoken:'tu fais',    form:'fais',    ex_fr:'Tu fais du sport ?',                ex_de:'Machst du Sport?' },
      { pronoun:'il / elle / on', spoken:'il fait',    form:'fait',    ex_fr:'Il fait beau aujourd\'hui.',        ex_de:'Heute ist schönes Wetter.' },
      { pronoun:'nous',           spoken:'nous faisons',form:'faisons',ex_fr:'Nous faisons la cuisine ensemble.', ex_de:'Wir kochen zusammen.' },
      { pronoun:'vous',           spoken:'vous faites', form:'faites', ex_fr:'Vous faites de la musique ?',       ex_de:'Macht ihr Musik?' },
      { pronoun:'ils / elles',    spoken:'ils font',   form:'font',    ex_fr:'Ils font un voyage en France.',     ex_de:'Sie machen eine Reise nach Frankreich.' },
    ]
  },
  aller: {
    cls: 'form-aller',
    rows: [
      { pronoun:'je',             spoken:'je vais',    form:'vais',    ex_fr:'Je vais à l\'école à pied.',        ex_de:'Ich gehe zu Fuß zur Schule.' },
      { pronoun:'tu',             spoken:'tu vas',     form:'vas',     ex_fr:'Tu vas bien ?',                     ex_de:'Geht es dir gut?' },
      { pronoun:'il / elle / on', spoken:'elle va',    form:'va',      ex_fr:'Elle va au cinéma ce soir.',        ex_de:'Sie geht heute Abend ins Kino.' },
      { pronoun:'nous',           spoken:'nous allons',form:'allons',  ex_fr:'Nous allons au marché.',            ex_de:'Wir gehen auf den Markt.' },
      { pronoun:'vous',           spoken:'vous allez', form:'allez',   ex_fr:'Vous allez en France cet été ?',    ex_de:'Fahrt ihr diesen Sommer nach Frankreich?' },
      { pronoun:'ils / elles',    spoken:'ils vont',   form:'vont',    ex_fr:'Ils vont au stade ensemble.',       ex_de:'Sie gehen gemeinsam ins Stadion.' },
    ]
  },
  avoir: {
    cls: 'form-avoir',
    rows: [
      { pronoun:'j\'',            spoken:'j\'ai',      form:'ai',      ex_fr:'J\'ai très faim.',                  ex_de:'Ich habe großen Hunger.' },
      { pronoun:'tu',             spoken:'tu as',      form:'as',      ex_fr:'Tu as de la chance !',              ex_de:'Du hast Glück!' },
      { pronoun:'il / elle / on', spoken:'elle a',     form:'a',       ex_fr:'Elle a quinze ans.',                ex_de:'Sie ist fünfzehn Jahre alt.' },
      { pronoun:'nous',           spoken:'nous avons', form:'avons',   ex_fr:'Nous avons un grand chien.',        ex_de:'Wir haben einen großen Hund.' },
      { pronoun:'vous',           spoken:'vous avez',  form:'avez',    ex_fr:'Vous avez raison.',                 ex_de:'Sie haben Recht.' },
      { pronoun:'ils / elles',    spoken:'ils ont',    form:'ont',     ex_fr:'Ils ont peur du chien.',            ex_de:'Sie haben Angst vor dem Hund.' },
    ]
  },
  etre: {
    cls: 'form-etre',
    rows: [
      { pronoun:'je',             spoken:'je suis',    form:'suis',    ex_fr:'Je suis très fatigué.',             ex_de:'Ich bin sehr müde.' },
      { pronoun:'tu',             spoken:'tu es',      form:'es',      ex_fr:'Tu es prêt ?',                      ex_de:'Bist du bereit?' },
      { pronoun:'il / elle / on', spoken:'il est',     form:'est',     ex_fr:'Il est en retard.',                 ex_de:'Er ist zu spät.' },
      { pronoun:'nous',           spoken:'nous sommes',form:'sommes',  ex_fr:'Nous sommes très contents.',        ex_de:'Wir sind sehr zufrieden.' },
      { pronoun:'vous',           spoken:'vous êtes',  form:'êtes',    ex_fr:'Vous êtes d\'accord ?',             ex_de:'Seid ihr einverstanden?' },
      { pronoun:'ils / elles',    spoken:'elles sont', form:'sont',    ex_fr:'Elles sont enfin de retour.',       ex_de:'Sie sind endlich zurück.' },
    ]
  }
};

function speak(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  function doSpeak() {
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = 'fr-FR';
    u.rate  = 0.80;
    u.pitch = 1.05;

    // Explizit eine französische Stimme suchen und zuweisen
    const voices = window.speechSynthesis.getVoices();
    const frVoice = voices.find(v => v.lang.startsWith('fr'));
    if (frVoice) u.voice = frVoice;

    if (btn) {
      btn.classList.add('speaking');
      u.onend = () => btn.classList.remove('speaking');
    }
    window.speechSynthesis.speak(u);
  }

  // Stimmen schon geladen? Dann direkt sprechen, sonst warten
  if (window.speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
  }
}

Object.entries(verbs).forEach(([key, data]) => {
  const table = document.getElementById('table-' + key);
  table.innerHTML = data.rows.map(row => `
    <tr>
      <td class="col-pronoun">
        <span class="pronoun">${row.pronoun}</span>
      </td>
      <td class="col-form">
        <div class="speak-main">
          <span class="form ${data.cls}">${row.form}</span>
          <button class="speak-btn" data-speak="${row.spoken}">🔊</button>
        </div>
      </td>
      <td class="col-example">
        <div class="example-cell">
          <div class="example-texts">
            <div class="example-fr">${row.ex_fr}</div>
            <div class="example-de">${row.ex_de}</div>
          </div>
          <button class="speak-btn-sm" data-speak="${row.ex_fr.replace(/"/g,'&quot;')}">💬</button>
        </div>
      </td>
    </tr>`).join('');
});

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-speak]');
  if (btn) speak(btn.dataset.speak, btn);
});
</script>
</body>
</html>
