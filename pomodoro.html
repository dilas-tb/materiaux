<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achtsamkeits-Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F2EFE9;
            --card-color: #FCFAF7;
            --text-color: #5C534B;
            --thyme-green: #8A9A8A;
            --thyme-dark: #6F7F6F;
            --shadow: 0 10px 30px rgba(92, 83, 75, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-color);
            padding: 2.5rem 3rem 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 90%;
            max-width: 420px;
            position: relative;
        }

        .timer-area {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-display {
            font-family: 'Montserrat', sans-serif;
            font-size: 5.5rem;
            font-weight: 300;
            color: var(--text-color);
            position: relative;
            z-index: 1;
            line-height: 1;
        }

        .breathing-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid var(--thyme-green);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        .is-running .breathing-circle {
            opacity: 0.3;
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.2; }
        }

        h1 {
            font-weight: 600;
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
        }

        .quote {
            font-size: 0.95rem;
            font-style: italic;
            opacity: 0.65;
            margin-bottom: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            min-height: 1.4em;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-primary {
            background-color: var(--thyme-green);
            color: white;
            box-shadow: 0 4px 15px rgba(138, 154, 138, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--thyme-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(92, 83, 75, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="container" id="timer-container">

        <div class="timer-area">
            <div class="breathing-circle"></div>
            <div class="timer-display" id="timer">25:00</div>
        </div>

        <h1 id="phase-title">Fokus</h1>
        <p class="quote" id="quote">Atme tief ein. Fokus.</p>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Starten</button>
            <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <script>
        const modes = {
            pomodoro: 25,
            shortBreak: 5,
            longBreak: 15
        };

        const titles = {
            pomodoro: "Fokus",
            shortBreak: "Kleine Pause",
            longBreak: "Große Pause"
        };

        const quotes = {
            pomodoro: "Atme tief ein. Fokus.",
            shortBreak: "Lass den Blick schweifen.",
            longBreak: "Zeit zum Aufladen.",
            done: "Geschafft."
        };

        let timeLeft = modes.pomodoro * 60;
        let timerId = null;
        let isRunning = false;
        let currentMode = 'pomodoro';
        let audioCtx = null;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const quoteDisplay = document.getElementById('quote');
        const phaseTitle = document.getElementById('phase-title');
        const container = document.getElementById('timer-container');

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playSingingBowl() {
            const ctx = getAudioContext();
            if (ctx.state === 'suspended') ctx.resume();

            const duration = 6;
            const now = ctx.currentTime;

            // Grundton
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(174, now);
            osc1.frequency.exponentialRampToValueAtTime(172, now + duration);
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(0.35, now + 0.05);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc1.connect(gain1).connect(ctx.destination);
            osc1.start(now);
            osc1.stop(now + duration);

            // Oberton 1
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(348, now);
            osc2.frequency.exponentialRampToValueAtTime(345, now + duration);
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.linearRampToValueAtTime(0.15, now + 0.03);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);
            osc2.connect(gain2).connect(ctx.destination);
            osc2.start(now);
            osc2.stop(now + duration);

            // Oberton 2
            const osc3 = ctx.createOscillator();
            const gain3 = ctx.createGain();
            osc3.type = 'sine';
            osc3.frequency.setValueAtTime(528, now);
            gain3.gain.setValueAtTime(0, now);
            gain3.gain.linearRampToValueAtTime(0.08, now + 0.02);
            gain3.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.5);
            osc3.connect(gain3).connect(ctx.destination);
            osc3.start(now);
            osc3.stop(now + duration);

            // Leichtes Schimmern / Beating
            const osc4 = ctx.createOscillator();
            const gain4 = ctx.createGain();
            osc4.type = 'sine';
            osc4.frequency.setValueAtTime(176, now);
            gain4.gain.setValueAtTime(0, now);
            gain4.gain.linearRampToValueAtTime(0.12, now + 0.05);
            gain4.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.8);
            osc4.connect(gain4).connect(ctx.destination);
            osc4.start(now);
            osc4.stop(now + duration);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeLeft);
            document.title = `${formatTime(timeLeft)} – ${titles[currentMode]}`;
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            // Unlock AudioContext on first user gesture
            getAudioContext();
            isRunning = true;
            startBtn.textContent = "Pause";
            container.classList.add('is-running');

            if (quoteDisplay.textContent === quotes.done) {
                quoteDisplay.textContent = quotes[currentMode];
            }

            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = "Weiter";
            container.classList.remove('is-running');
            clearInterval(timerId);
        }

        function resetTimer() {
            pauseTimer();
            startBtn.textContent = "Starten";
            timeLeft = modes[currentMode] * 60;
            quoteDisplay.textContent = quotes[currentMode];
            updateDisplay();
        }

        function completeTimer() {
            pauseTimer();
            playSingingBowl();
            quoteDisplay.textContent = quotes.done;
            startBtn.textContent = "Starten";

            if (currentMode === 'pomodoro') {
                setTimeout(() => setMode('shortBreak'), 2000);
            } else {
                setTimeout(() => setMode('pomodoro'), 2000);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            phaseTitle.textContent = titles[mode];
            quoteDisplay.textContent = quotes[mode];
            pauseTimer();
            startBtn.textContent = "Starten";
            timeLeft = modes[mode] * 60;
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
