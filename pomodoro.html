<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achtsamkeits-Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <style>
        /* --- Farbpalette & Variablen --- */
        :root {
            --bg-color: #F2EFE9;        
            --card-color: #FCFAF7;      
            --text-color: #5C534B;      
            --thyme-green: #8A9A8A;     
            --thyme-dark: #6F7F6F;      
            --shadow: 0 10px 30px rgba(92, 83, 75, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-color);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 90%;
            max-width: 450px;
            position: relative;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .quote {
            font-size: 1rem;
            font-style: italic;
            opacity: 0.7;
            margin-bottom: 2rem;
            font-family: 'Cormorant Garamond', serif;
            min-height: 1.5em; /* Damit der Text nicht springt */
        }

        .modes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        .mode-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0.6;
        }

        .mode-btn:hover {
            opacity: 1;
            background-color: rgba(138, 154, 138, 0.1);
        }

        .mode-btn.active {
            opacity: 1;
            border-color: var(--thyme-green);
            color: var(--thyme-dark);
            background-color: rgba(138, 154, 138, 0.15);
        }

        .timer-display {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 300;
            color: var(--text-color);
            margin: 1rem 0;
            position: relative;
            z-index: 1;
        }

        /* --- Der "Atmende" Kreis --- */
        .breathing-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid var(--thyme-green);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        .is-running .breathing-circle {
            opacity: 0.3;
            /* Animation verlangsamt auf 8 Sekunden für mehr Ruhe */
            animation: breathe 8s infinite ease-in-out;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.2; }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-primary {
            background-color: var(--thyme-green);
            color: white;
            box-shadow: 0 4px 15px rgba(138, 154, 138, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--thyme-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(92, 83, 75, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--text-color);
        }

    </style>
</head>
<body>

    <div class="container" id="timer-container">
        <h1>Fokus</h1>
        <p class="quote" id="quote">Hier und jetzt.</p>

        <div class="modes">
            <button class="mode-btn active" onclick="switchModeWrapper('pomodoro')">Fokus</button>
            <button class="mode-btn" onclick="switchModeWrapper('shortBreak')">Kleine Pause</button>
            <button class="mode-btn" onclick="switchModeWrapper('longBreak')">Große Pause</button>
        </div>

        <div style="position: relative; height: 300px; display: flex; justify-content: center; align-items: center;">
            <div class="breathing-circle"></div>
            <div class="timer-display" id="timer">25:00</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Starten</button>
            <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Klangschalen-Sound von Wikimedia Commons (Public Domain) -->
    <audio id="gong-sound" preload="auto">
        <source src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Tibetan_Bowl_Gong.ogg" type="audio/ogg">
        <source src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Tibetan_Singing_Bowl_Strike.ogg" type="audio/ogg">
    </audio>

    <script>
        const modes = {
            pomodoro: 25,
            shortBreak: 5,
            longBreak: 15
        };

        const quotes = {
            pomodoro: "Atme tief ein. Fokus.",
            shortBreak: "Lass den Blick schweifen.",
            longBreak: "Zeit zum Aufladen.",
            done: "Feierabend."
        };

        let timeLeft = modes.pomodoro * 60;
        let timerId = null;
        let isRunning = false;
        let currentMode = 'pomodoro';

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const quoteDisplay = document.getElementById('quote');
        const container = document.getElementById('timer-container');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const gong = document.getElementById('gong-sound');

        // Lautstärke etwas sanfter einstellen
        gong.volume = 0.6;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeLeft);
            document.title = `${formatTime(timeLeft)} - Achtsamkeit`;
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.textContent = "Pause";
            container.classList.add('is-running');
            
            // Setze Zitat zurück, falls wir gerade fertig waren
            if (quoteDisplay.textContent === quotes.done) {
                quoteDisplay.textContent = quotes[currentMode];
            }

            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = "Weiter";
            container.classList.remove('is-running');
            clearInterval(timerId);
        }

        function resetTimer() {
            pauseTimer();
            startBtn.textContent = "Starten";
            timeLeft = modes[currentMode] * 60;
            updateDisplay();
        }

        function completeTimer() {
            pauseTimer();
            
            // Gong abspielen
            gong.currentTime = 0;
            gong.play().catch(e => console.log("Audio konnte nicht automatisch starten:", e));

            quoteDisplay.textContent = quotes.done;
            startBtn.textContent = "Starten";

            // Logik für automatischen Wechsel
            if (currentMode === 'pomodoro') {
                // Nach Pomodoro -> Wechsel zur kurzen Pause
                setTimeout(() => {
                    switchModeWrapper('shortBreak');
                    // Optional: Falls du möchtest, dass die Pause SOFORT startet,
                    // entferne den Kommentar vor der nächsten Zeile:
                    // toggleTimer(); 
                }, 1500); // 1.5 Sekunden Verzögerung, um den Gong wirken zu lassen
            } else {
                // Nach Pause -> Wechsel zurück zu Pomodoro
                setTimeout(() => {
                    switchModeWrapper('pomodoro');
                }, 1500);
            }
        }

        // Wrapper Funktion für die Buttons
        function switchModeWrapper(mode) {
            setMode(mode);
        }

        function setMode(mode) {
            currentMode = mode;
            
            // Buttons UI aktualisieren
            modeButtons.forEach(btn => btn.classList.remove('active'));
            const index = mode === 'pomodoro' ? 0 : mode === 'shortBreak' ? 1 : 2;
            modeButtons[index].classList.add('active');

            // Text anpassen
            quoteDisplay.textContent = quotes[mode];

            resetTimer();
        }

        updateDisplay();
    </script>
</body>

</html>
